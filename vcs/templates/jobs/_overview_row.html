<div class="flex items-center gap-3">
    <div class="w-[32px] h-[32px] bg-[#f1f5fb] rounded-[8px] flex items-center justify-center shrink-0">
        <i class="fa-solid {{ icon }} text-[#3d35c4] text-[12px]"></i>
    </div>
    <div>
        <p class="text-[11px] text-[#aab8c8] font-semibold uppercase tracking-wide">{{ label }}</p>
        <p class="text-[13px] text-[#1a2b4a] font-bold">{{ value }}</p>
    </div>
</div>
